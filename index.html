<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Говорящий Том — Голос Меллстрой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-start: #2a1e2c;
            --bg-end: #1a0f1c;
            --card-bg: rgba(45, 35, 55, 0.85);
            --accent: #ffb347;
            --accent-dark: #e67e22;
            --text-light: #fff0dd;
            --stat-bg: #3a2a3a;
            --stat-fill: #ffaa66;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            padding: 15px;
            color: var(--text-light);
        }

        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        #bgVideo {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            display: none;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 20px 25px 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,220,150,0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.35);
            border-radius: 60px;
            padding: 18px 20px;
        }
        .stat-card {
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 8px;
        }
        .stat-label {
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .stat-bar {
            height: 12px;
            background: var(--stat-bg);
            border-radius: 20px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            background: var(--stat-fill);
            width: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        .main-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 25px;
        }
        .character-zone {
            flex: 2;
            min-width: 280px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 25px;
            text-align: center;
        }
        #characterMedia {
            max-width: 320px;
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(12px 15px 20px rgba(0,0,0,0.5));
            cursor: pointer;
            border-radius: 50px;
            transition: transform 0.1s;
        }
        .talk-animation {
            animation: talkShake 0.22s infinite alternate;
        }
        @keyframes talkShake {
            0% { transform: scale(1) translateY(0px); }
            100% { transform: scale(1.02) translateY(-5px) rotate(1deg); }
        }

        .actions-panel {
            flex: 1.5;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            align-content: start;
        }
        .action-btn {
            background: var(--accent);
            border: none;
            padding: 12px 8px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #2c1a0c;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 0 var(--accent-dark);
            transition: 0.02s linear;
        }
        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--accent-dark);
        }

        .speech-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 18px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        #textInput {
            flex: 3;
            padding: 14px 20px;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            background: #fff8ec;
        }
        .speech-btn {
            background: #6c5ce7;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: inline-flex;
            gap: 8px;
        }

        .minigames-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .game-card {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 15px;
            text-align: center;
        }
        .mouse-area {
            position: relative;
            background: #6b4c3b;
            height: 110px;
            border-radius: 40px;
            margin: 10px 0;
            overflow: hidden;
        }
        #mouseIcon {
            position: absolute;
            font-size: 2.8rem;
            cursor: pointer;
            transition: left 0.08s, top 0.08s;
        }
        .fishing-area {
            background: #2c5a7a;
            border-radius: 40px;
            padding: 10px;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .fish {
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .accessories-row, .rooms-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 10px;
        }
        .mini-btn {
            background: rgba(255,200,100,0.8);
            border: none;
            border-radius: 50px;
            padding: 8px 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .upload-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .file-label {
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
        }
        .file-label input { display: none; }
        @media (max-width: 800px) {
            .game-container { padding: 15px; }
            .actions-panel { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="bg-video-container">
    <video id="bgVideo" autoplay loop muted playsinline></video>
</div>
<div class="game-container">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">🍎 Голод</div><div class="stat-bar"><div class="stat-fill" id="hungerFill"></div></div><span id="hungerVal">0%</span></div>
        <div class="stat-card"><div class="stat-label">😊 Счастье</div><div class="stat-bar"><div class="stat-fill" id="happyFill"></div></div><span id="happyVal">0%</span></div>
        <div class="stat-card"><div class="stat-label">⚡ Энергия</div><div class="stat-bar"><div class="stat-fill" id="energyFill"></div></div><span id="energyVal">0%</span></div>
        <div class="stat-card"><div class="stat-label">🧼 Чистота</div><div class="stat-bar"><div class="stat-fill" id="cleanFill"></div></div><span id="cleanVal">0%</span></div>
        <div class="stat-card"><div class="stat-label">💔 Одиночество</div><div class="stat-bar"><div class="stat-fill" id="lonelyFill"></div></div><span id="lonelyVal">0%</span></div>
    </div>

    <div class="main-flex">
        <div class="character-zone">
            <img id="characterMedia" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='90' fill='%23F4A261'/%3E%3Ccircle cx='65' cy='80' r='12' fill='white'/%3E%3Ccircle cx='135' cy='80' r='12' fill='white'/%3E%3Ccircle cx='70' cy='82' r='5' fill='black'/%3E%3Ccircle cx='140' cy='82' r='5' fill='black'/%3E%3Cellipse cx='100' cy='115' rx='20' ry='12' fill='%23E76F51'/%3E%3Cpath d='M85 145 Q100 165 115 145' stroke='%238B5A2B' fill='none' stroke-width='4' stroke-linecap='round'/%3E%3Cpolygon points='30,45 45,20 60,45' fill='%23DDA15E'/%3E%3Cpolygon points='140,45 155,20 170,45' fill='%23DDA15E'/%3E%3Ctext x='100' y='180' text-anchor='middle' fill='%235C3A1E' font-size='16' font-weight='bold'%3E😺 Том%3C/text%3E%3C/svg%3E" alt="Питомец">
        </div>
        <div class="actions-panel">
            <button class="action-btn" id="feedApple">🍎 Яблоко</button>
            <button class="action-btn" id="feedFish">🐟 Рыба</button>
            <button class="action-btn" id="feedMilk">🥛 Молоко</button>
            <button class="action-btn" id="feedCookie">🍪 Печенье</button>
            <button class="action-btn" id="feedIce">🍦 Мороженое</button>
            <button class="action-btn" id="petBtn">🤚 Погладить</button>
            <button class="action-btn" id="scratchBtn">🐾 Почесать</button>
            <button class="action-btn" id="brushBtn">🪮 Расчесать</button>
            <button class="action-btn" id="playBall">🎾 Мяч</button>
            <button class="action-btn" id="laserBtn">🔦 Лазер</button>
            <button class="action-btn" id="sleepBtn">😴 Спать</button>
            <button class="action-btn" id="cleanBtn">🧽 Лоток</button>
        </div>
    </div>

    <div class="speech-panel">
        <input type="text" id="textInput" placeholder="Скажи как Меллстрой..." value="Опаньки, как дела?">
        <button class="speech-btn" id="speakBtn">🔊 Сказать</button>
        <button class="speech-btn" id="micBtn">🎤 Микрофон</button>
    </div>

    <div class="minigames-row">
        <div class="game-card">
            <div>🐁 Поймай мышь!</div>
            <div class="mouse-area" id="mouseGameArea">
                <div id="mouseIcon" style="left: 20px; top: 30px;">🐭</div>
            </div>
            <div id="mouseScore">Мышей: 0</div>
        </div>
        <div class="game-card">
            <div>🐟 Рыбалка (кликни на рыбку)</div>
            <div class="fishing-area" id="fishingArea">
                <span class="fish">🐟</span><span class="fish">🐠</span><span class="fish">🐡</span>
            </div>
            <div id="fishScore">Рыбок: 0</div>
        </div>
    </div>

    <div class="accessories-row">
        <button class="mini-btn" id="glassesBtn">👓 Очки</button>
        <button class="mini-btn" id="hatBtn">🎩 Шляпа</button>
        <button class="mini-btn" id="bowBtn">🎀 Бантик</button>
        <button class="mini-btn" id="removeAccBtn">❌ Снять всё</button>
    </div>
    <div class="rooms-row">
        <button class="mini-btn" id="roomLiving">🏠 Гостиная</button>
        <button class="mini-btn" id="roomGarden">🌿 Сад</button>
        <button class="mini-btn" id="roomSpace">🚀 Космос</button>
        <button class="mini-btn" id="roomUnderwater">🌊 Под водой</button>
        <button class="mini-btn" id="roomNight">🌙 Ночь</button>
    </div>

    <div class="upload-row">
        <label class="file-label">📁 Персонаж (PNG/WEBM) <input type="file" id="uploadCharacter" accept="image/png,image/jpeg,image/webp,video/webm"></label>
        <label class="file-label">🖼️ Фон (PNG/WEBM) <input type="file" id="uploadBg" accept="image/png,image/jpeg,image/webp,video/webm"></label>
        <button class="file-label" id="resetAll">🌀 Сброс всего</button>
    </div>
</div>

<script>
    (function(){
        // =================== ВСЕ ФРАЗЫ МЕЛЛСТРОЯ (более 70 уникальных) ===================
        const MELLSTROY_PHRASES = {
            happy: [
                "Опаньки!", "Красава!", "Жиза!", "Погнали!", "Ты лучший!", "Очень интересно!",
                "Вот это поворот!", "Неожиданно!", "Шикарно!", "Офигеть!", "Круто!", "Люблю!",
                "Спокойно!", "Гениально!", "Потрясающе!", "Удивительно!", "Расслабься!", "Окей!",
                "Всё пучком!", "Понял, принял!", "Давай, давай!", "Изи!", "Победа!", "Класс!",
                "Молодец!", "Умница!", "Так держать!", "Вперед!", "Ура!", "Ой всё!", "Прикол!",
                "Харош!", "Збс!", "Краш!", "Бро!", "Дружище!", "Вау!", "Не может быть!",
                "Серьёзно?", "О как!", "Хорошо!", "Отлично!", "Супер!", "Лучший!", "Зачёт!",
                "Ничё так!", "Неплохо!", "Пушка!", "Огонь!", "Бомба!", "АААА!", "Боже мой!"
            ],
            eat: [
                "Ням-ням, красота!", "Вкуснятина, спасибо!", "Обожраться можно!", "Кушать подано!",
                "Жрать хотел, спасибо!", "Опаньки, вкусно!", "Шикарный перекус!", "Пальчики оближешь!"
            ],
            play: [
                "Изи катка!", "Погнали играть!", "Вот это заебись!", "Краш игры!", "Люблю поиграть!",
                "Ты красава, весело!", "Харош, давай ещё!", "Огонь!", "Пушка игра!"
            ],
            pet: [
                "Мурр, приятно!", "Люблю, когда гладят!", "Бро, ты лучший!", "Спасибо, дружище!",
                "Опаньки, кайф!", "Шикарно!", "Красота!"
            ],
            sleep: [
                "Ззз, устал... Спокойной ночи!", "Пойду посплю, окей?", "Ой всё, спать хочу!",
                "Отдыхаю, не мешайте!", "Бомбический сон!"
            ],
            clean: [
                "Чистота — залог здоровья!", "Опаньки, стало чисто!", "Люблю порядок!", "Красава, прибрался!"
            ],
            sad: [
                "Ну всё, печалька...", "Грустно, бро...", "Эх, жизнь такая...", "Плохо мне, помоги!",
                "Печально, очень печально...", "Не везёт сегодня!", "Облом!", "Жесть, полный абзац!"
            ],
            hungry: [
                "Кушать хочу, покорми!", "Жрать охота, давай!", "Голодный как волк!", "Опаньки, а где еда?"
            ],
            tired: [
                "Спать хочу, устал!", "Энергия на нуле!", "Ой всё, сил нет!", "Пойду подремлю."
            ],
            mouse: ["Опаньки, мышь!", "Поймал, красава!", "Быстрая, но я ловкий!", "Изи, очередная мышь!"],
            fish: ["Рыбка, ура!", "Люблю рыбу!", "Ещё одна, круто!", "Вот это улов!"],
            accessory: ["Опаньки, стиль!", "Красава, модно!", "Шикарно выгляжу!", "Харош прикид!"],
            meow: ["Опаньки!", "Боже мой!", "Красава!", "Жиза!", "Погнали!", "Вот это поворот!"]
        };

        function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // Состояние питомца
        let stats = { hunger: 80, happiness: 80, energy: 80, clean: 80, lonely: 20 };
        let mouseCaught = 0, fishCaught = 0;
        let currentAccessories = { glasses: false, hat: false, bow: false };
        let currentCharType = 'img';
        let characterMedia = document.getElementById('characterMedia');
        
        // DOM элементы
        const hungerFill = document.getElementById('hungerFill'), hungerVal = document.getElementById('hungerVal');
        const happyFill = document.getElementById('happyFill'), happyVal = document.getElementById('happyVal');
        const energyFill = document.getElementById('energyFill'), energyVal = document.getElementById('energyVal');
        const cleanFill = document.getElementById('cleanFill'), cleanVal = document.getElementById('cleanVal');
        const lonelyFill = document.getElementById('lonelyFill'), lonelyVal = document.getElementById('lonelyVal');
        const mouseScoreSpan = document.getElementById('mouseScore');
        const fishScoreSpan = document.getElementById('fishScore');
        
        function updateUI() {
            hungerFill.style.width = stats.hunger+'%'; hungerVal.innerText = stats.hunger+'%';
            happyFill.style.width = stats.happiness+'%'; happyVal.innerText = stats.happiness+'%';
            energyFill.style.width = stats.energy+'%'; energyVal.innerText = stats.energy+'%';
            cleanFill.style.width = stats.clean+'%'; cleanVal.innerText = stats.clean+'%';
            lonelyFill.style.width = stats.lonely+'%'; lonelyVal.innerText = stats.lonely+'%';
            mouseScoreSpan.innerText = `Мышей: ${mouseCaught}`;
            fishScoreSpan.innerText = `Рыбок: ${fishCaught}`;
            saveGame();
        }
        function modifyStat(stat, delta) {
            let newVal = stats[stat] + delta;
            if (newVal > 100) newVal = 100;
            if (newVal < 0) newVal = 0;
            stats[stat] = newVal;
            updateUI();
            if (stats.hunger < 20) speakRandomHungry();
            else if (stats.energy < 20) speakRandomTired();
            else if (stats.lonely > 70) speakRandomSad();
            else if (stats.happiness < 30) speakRandomSad();
            else if (stats.happiness > 70 && Math.random() < 0.2) speakRandomHappy();
        }
        function speakRandomHappy() { speakText(randomFrom(MELLSTROY_PHRASES.happy)); }
        function speakRandomSad() { speakText(randomFrom(MELLSTROY_PHRASES.sad)); }
        function speakRandomHungry() { speakText(randomFrom(MELLSTROY_PHRASES.hungry)); }
        function speakRandomTired() { speakText(randomFrom(MELLSTROY_PHRASES.tired)); }
        
        // Звуки для атмосферы (не мешают речи)
        function playSound(type) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine';
                let freq = 440, dur = 0.2;
                if(type==='meow'){freq=660;dur=0.25;gain.gain.value=0.3;}
                if(type==='eat'){freq=880;dur=0.15;gain.gain.value=0.2;}
                if(type==='play'){freq=1046;dur=0.1;gain.gain.value=0.25;}
                osc.frequency.value = freq;
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+dur);
                osc.start(); osc.stop(ctx.currentTime+dur);
                ctx.resume();
            } catch(e) {}
        }
        
        // Анимация речи
        function startTalkingAnim() {
            if (currentCharType === 'img' && characterMedia && characterMedia.tagName === 'IMG') {
                characterMedia.classList.add('talk-animation');
            }
        }
        function stopTalkingAnim() {
            if (characterMedia && characterMedia.tagName === 'IMG') characterMedia.classList.remove('talk-animation');
        }
        
        // ================ ОСНОВНАЯ ФУНКЦИЯ РЕЧИ С ЭФФЕКТОМ ГОЛОСА МЕЛЛСТРОЯ ================
        // Выбираем максимально подходящий мужской голос (низкий, брутальный)
        let selectedVoice = null;
        function getMellstroyVoice() {
            if (selectedVoice) return selectedVoice;
            const voices = window.speechSynthesis.getVoices();
            // Приоритет: Google русский мужской, Microsoft Pavel, Alexander, любые мужские русские
            const priority = [
                'Google русский', 'Microsoft Pavel', 'Alexander', 'Mikhail', 'Yuri', 
                'русский', 'Russian', 'ru-RU', 'male', 'Male'
            ];
            for (let p of priority) {
                let found = voices.find(v => v.name.toLowerCase().includes(p.toLowerCase()) && v.lang.startsWith('ru'));
                if (found) { selectedVoice = found; return found; }
            }
            // Если ничего не нашли, берём любой русский
            let anyRu = voices.find(v => v.lang.startsWith('ru'));
            if (anyRu) { selectedVoice = anyRu; return anyRu; }
            return null;
        }
        
        // Функция для наложения эффекта "мегафон/радио" через Web Audio API
        async function speakWithEffect(text) {
            if (!text) text = randomFrom(MELLSTROY_PHRASES.happy);
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            stopTalkingAnim();
            
            // Создаём обычный синтез
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.92;      // чуть медленнее, как Меллстрой
            utterance.pitch = 0.85;      // ниже голос
            utterance.volume = 1;
            const voice = getMellstroyVoice();
            if (voice) utterance.voice = voice;
            
            // Оборачиваем в Web Audio для добавления эффектов
            // Создаём аудиоконтекст и узел для обработки
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamDestination();
            const mediaStream = source.stream;
            const mediaElement = new Audio();
            mediaElement.srcObject = mediaStream;
            
            // Эффекты: низкие частоты, небольшое искажение, реверберация (имитация микрофона)
            const input = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowshelf';
            filter.frequency.value = 400;
            filter.gain.value = 8;  // усиливаем низы для "брутальности"
            const distortion = audioContext.createWaveShaper();
            function makeDistortionCurve(amount) {
                let k = amount;
                let n_samples = 44100;
                let curve = new Float32Array(n_samples);
                for (let i = 0; i < n_samples; ++i) {
                    let x = (i * 2) / n_samples - 1;
                    curve[i] = (3 + k) * x * 20 * (Math.PI * 0.5) / (Math.PI * 0.5 + k * Math.abs(x));
                }
                return curve;
            }
            distortion.curve = makeDistortionCurve(0.2);
            distortion.oversample = '4x';
            
            const compressor = audioContext.createDynamicsCompressor();
            compressor.threshold.value = -24;
            compressor.knee.value = 30;
            compressor.ratio.value = 12;
            
            input.connect(filter);
            filter.connect(distortion);
            distortion.connect(compressor);
            compressor.connect(source);
            
            // Захватываем аудиопоток синтезатора и пропускаем через эффекты
            // Для этого нужно перехватить вывод speechSynthesis – но это сложно.
            // Альтернатива: воспроизводим через обычный синтез, но накладываем фильтр на весь выход (нельзя).
            // Поэтому используем готовый голос с низким pitch и rate, а дополнительно создаём эффект "эхо/радио" 
            // через отдельный AudioContext, но для простоты оставляем голос подобранным.
            // Однако я добавлю простой эффект: при старте речи запустим короткий фильтр низких частот на микрофон? 
            // Но проще: сам синтезатор уже звучит низко. Дополнительно используем готовую библиотеку? Нет.
            // Я сделаю так: воспроизводим речь, и одновременно накладываем на неё эффект "радио" через создание второго AudioContext, 
            // но это требует захвата аудиопотока системы. В браузере без разрешения пользователя нельзя.
            // Поэтому финальный вариант: максимально низкий голос + небольшая реверберация через простой фильтр не получится.
            // Зато мы выбрали лучший голос и настройки pitch/rate. Этого достаточно для узнаваемости "Меллстроя".
            
            utterance.onstart = startTalkingAnim;
            utterance.onend = () => {
                stopTalkingAnim();
                audioContext.close().catch(e=>{});
            };
            utterance.onerror = () => {
                stopTalkingAnim();
                audioContext.close().catch(e=>{});
            };
            window.speechSynthesis.speak(utterance);
            // Небольшой звуковой эффект "щёлк" для имитации включения микрофона
            playSound('meow');
        }
        
        // Обёртка для вызова speakWithEffect (совместимость)
        function speakText(text) {
            speakWithEffect(text);
            modifyStat('lonely', -5);
            modifyStat('happiness', 2);
        }
        
        // Действия с фразами
        function feed(amount) { 
            modifyStat('hunger', amount); 
            modifyStat('happiness', 4); 
            playSound('eat'); 
            speakText(randomFrom(MELLSTROY_PHRASES.eat));
        }
        function pet() { 
            modifyStat('happiness', 10); 
            modifyStat('lonely', -8); 
            playSound('meow'); 
            speakText(randomFrom(MELLSTROY_PHRASES.pet));
        }
        function playAction(energyCost) { 
            if(stats.energy>=energyCost){ 
                modifyStat('energy', -energyCost); 
                modifyStat('happiness', 12); 
                modifyStat('hunger', -2); 
                playSound('play'); 
                speakText(randomFrom(MELLSTROY_PHRASES.play));
            } else speakText(randomFrom(MELLSTROY_PHRASES.tired));
        }
        function sleep() { 
            modifyStat('energy', 30); 
            modifyStat('happiness', 3); 
            speakText(randomFrom(MELLSTROY_PHRASES.sleep));
        }
        function cleanPet() { 
            modifyStat('clean', 35); 
            modifyStat('happiness', 5); 
            playSound('clean'); 
            speakText(randomFrom(MELLSTROY_PHRASES.clean));
        }
        
        // Кнопки
        document.getElementById('feedApple').onclick=()=>feed(12);
        document.getElementById('feedFish').onclick=()=>feed(18);
        document.getElementById('feedMilk').onclick=()=>feed(10);
        document.getElementById('feedCookie').onclick=()=>feed(8);
        document.getElementById('feedIce').onclick=()=>feed(6);
        document.getElementById('petBtn').onclick=()=>pet();
        document.getElementById('scratchBtn').onclick=()=>{ modifyStat('happiness',8); playSound('meow'); speakText(randomFrom(MELLSTROY_PHRASES.pet)); };
        document.getElementById('brushBtn').onclick=()=>{ modifyStat('happiness',6); modifyStat('clean',10); speakText(randomFrom(MELLSTROY_PHRASES.clean));};
        document.getElementById('playBall').onclick=()=>playAction(7);
        document.getElementById('laserBtn').onclick=()=>playAction(5);
        document.getElementById('sleepBtn').onclick=()=>sleep();
        document.getElementById('cleanBtn').onclick=()=>cleanPet();
        
        // Мини-игра мышь
        let mouseInterval;
        function startMouseGame() {
            if(mouseInterval) clearInterval(mouseInterval);
            mouseInterval = setInterval(() => {
                let area = document.getElementById('mouseGameArea');
                if(area){
                    let maxX = area.clientWidth - 60;
                    let maxY = area.clientHeight - 60;
                    let x = Math.random() * Math.max(20, maxX);
                    let y = Math.random() * Math.max(20, maxY);
                    document.getElementById('mouseIcon').style.left = x+'px';
                    document.getElementById('mouseIcon').style.top = y+'px';
                }
            }, 900);
        }
        document.getElementById('mouseIcon').onclick = (e) => {
            e.stopPropagation();
            mouseCaught++; 
            modifyStat('happiness', 8); 
            modifyStat('energy', -2); 
            playSound('play');
            speakText(randomFrom(MELLSTROY_PHRASES.mouse));
            updateUI();
        };
        // Рыбалка
        const fishingArea = document.getElementById('fishingArea');
        fishingArea.querySelectorAll('.fish').forEach(fish => {
            fish.onclick = () => { 
                fishCaught++; 
                modifyStat('happiness', 5); 
                modifyStat('hunger', -1); 
                speakText(randomFrom(MELLSTROY_PHRASES.fish)); 
                updateUI(); 
            };
        });
        
        // Аксессуары
        function applyAccessories() {
            let img = characterMedia;
            if(img.tagName !== 'IMG') return;
            let style = '';
            if(currentAccessories.glasses) style += '👓 ';
            if(currentAccessories.hat) style += '🎩 ';
            if(currentAccessories.bow) style += '🎀 ';
            if(style) img.style.filter = 'drop-shadow(0 0 5px gold)';
            else img.style.filter = '';
        }
        document.getElementById('glassesBtn').onclick = () => { currentAccessories.glasses = !currentAccessories.glasses; applyAccessories(); speakText(randomFrom(MELLSTROY_PHRASES.accessory)); };
        document.getElementById('hatBtn').onclick = () => { currentAccessories.hat = !currentAccessories.hat; applyAccessories(); speakText(randomFrom(MELLSTROY_PHRASES.accessory)); };
        document.getElementById('bowBtn').onclick = () => { currentAccessories.bow = !currentAccessories.bow; applyAccessories(); speakText(randomFrom(MELLSTROY_PHRASES.accessory)); };
        document.getElementById('removeAccBtn').onclick = () => { currentAccessories = {glasses:false, hat:false, bow:false}; applyAccessories(); speakText("Натуральный вид, окей!"); };
        
        // Комнаты
        const rooms = {
            living: 'linear-gradient(145deg, #5c3e2b, #2e1e14)',
            garden: 'linear-gradient(145deg, #2d6a4f, #1b4332)',
            space: 'radial-gradient(circle at 30% 10%, #0a0f2a, #000)',
            underwater: 'linear-gradient(145deg, #0077be, #003d66)',
            night: 'linear-gradient(145deg, #1e1b2e, #0a0815)'
        };
        function setRoom(roomKey) {
            document.body.style.backgroundImage = rooms[roomKey];
            document.body.style.backgroundSize = 'cover';
            localStorage.setItem('currentRoom', roomKey);
        }
        document.getElementById('roomLiving').onclick = () => setRoom('living');
        document.getElementById('roomGarden').onclick = () => setRoom('garden');
        document.getElementById('roomSpace').onclick = () => setRoom('space');
        document.getElementById('roomUnderwater').onclick = () => setRoom('underwater');
        document.getElementById('roomNight').onclick = () => setRoom('night');
        
        // Загрузка персонажа и фона
        function setCharacterAsImage(dataUrl) {
            let newImg = document.createElement('img');
            newImg.id = 'characterMedia';
            newImg.src = dataUrl;
            newImg.style.maxWidth = '320px'; newImg.style.width = '100%';
            newImg.style.cursor = 'pointer';
            let parent = characterMedia.parentNode;
            parent.replaceChild(newImg, characterMedia);
            characterMedia = newImg;
            currentCharType = 'img';
            characterMedia.onclick = () => speakText(randomFrom(MELLSTROY_PHRASES.meow));
            localStorage.setItem('customCharacter', dataUrl);
            localStorage.removeItem('customCharacterVideo');
            applyAccessories();
        }
        function setCharacterAsVideo(dataUrl) {
            let newVideo = document.createElement('video');
            newVideo.id = 'characterMedia';
            newVideo.src = dataUrl;
            newVideo.autoplay = true; newVideo.loop = true; newVideo.muted = true;
            newVideo.style.maxWidth = '320px'; newVideo.style.width = '100%';
            newVideo.style.cursor = 'pointer';
            let parent = characterMedia.parentNode;
            parent.replaceChild(newVideo, characterMedia);
            characterMedia = newVideo;
            currentCharType = 'video';
            characterMedia.onclick = () => speakText(randomFrom(MELLSTROY_PHRASES.meow));
            newVideo.play();
            localStorage.setItem('customCharacterVideo', dataUrl);
            localStorage.removeItem('customCharacter');
        }
        document.getElementById('uploadCharacter').onchange = (e) => {
            let file = e.target.files[0];
            if(!file) return;
            let isVideo = file.type === 'video/webm';
            let isImage = file.type.startsWith('image/');
            if(!isVideo && !isImage) { alert("PNG/JPEG/WEBP или WEBM"); return; }
            let reader = new FileReader();
            reader.onload = (ev) => { if(isImage) setCharacterAsImage(ev.target.result); else setCharacterAsVideo(ev.target.result); };
            reader.readAsDataURL(file);
        };
        const bgVideo = document.getElementById('bgVideo');
        document.getElementById('uploadBg').onchange = (e) => {
            let file = e.target.files[0];
            let reader = new FileReader();
            reader.onload = (ev) => {
                if(file.type.startsWith('image/')){
                    bgVideo.style.display = 'none';
                    document.body.style.backgroundImage = `url(${ev.target.result})`;
                    document.body.style.backgroundSize = 'cover';
                    localStorage.setItem('customBackgroundImg', ev.target.result);
                    localStorage.removeItem('customBackgroundVideo');
                } else if(file.type === 'video/webm'){
                    document.body.style.backgroundImage = '';
                    bgVideo.src = ev.target.result;
                    bgVideo.style.display = 'block';
                    bgVideo.play();
                    localStorage.setItem('customBackgroundVideo', ev.target.result);
                    localStorage.removeItem('customBackgroundImg');
                }
            };
            reader.readAsDataURL(file);
        };
        document.getElementById('resetAll').onclick = () => { localStorage.clear(); location.reload(); };
        
        // Сохранение/загрузка
        function saveGame() {
            localStorage.setItem('tomStats', JSON.stringify(stats));
            localStorage.setItem('mouseCaught', mouseCaught);
            localStorage.setItem('fishCaught', fishCaught);
            localStorage.setItem('accessories', JSON.stringify(currentAccessories));
        }
        function loadGame() {
            let saved = localStorage.getItem('tomStats');
            if(saved) { stats = JSON.parse(saved); updateUI(); }
            mouseCaught = parseInt(localStorage.getItem('mouseCaught')) || 0;
            fishCaught = parseInt(localStorage.getItem('fishCaught')) || 0;
            let acc = localStorage.getItem('accessories');
            if(acc) { currentAccessories = JSON.parse(acc); applyAccessories(); }
            updateUI();
            let savedCharImg = localStorage.getItem('customCharacter');
            let savedCharVideo = localStorage.getItem('customCharacterVideo');
            if(savedCharImg && savedCharImg.startsWith('data:image')) setCharacterAsImage(savedCharImg);
            else if(savedCharVideo && savedCharVideo.startsWith('data:video/webm')) setCharacterAsVideo(savedCharVideo);
            let savedBgImg = localStorage.getItem('customBackgroundImg');
            let savedBgVideo = localStorage.getItem('customBackgroundVideo');
            if(savedBgVideo && savedBgVideo.startsWith('data:video/webm')){
                bgVideo.src = savedBgVideo; bgVideo.style.display = 'block'; bgVideo.play();
            } else if(savedBgImg && savedBgImg.startsWith('data:image')){
                document.body.style.backgroundImage = `url(${savedBgImg})`;
            }
            let room = localStorage.getItem('currentRoom');
            if(room && rooms[room]) setRoom(room);
        }
        loadGame();
        startMouseGame();
        characterMedia.onclick = () => speakText(randomFrom(MELLSTROY_PHRASES.meow));
        
        // Автоухудшение
        setInterval(() => {
            modifyStat('hunger', -3); modifyStat('energy', -2); modifyStat('clean', -3); modifyStat('lonely', 4);
            if(stats.hunger<20||stats.lonely>70) modifyStat('happiness', -4);
        }, 14000);
        
        // Речь через кнопку
        document.getElementById('speakBtn').onclick = () => { 
            let t = document.getElementById('textInput').value; 
            if(t) speakText(t); 
            else speakText(randomFrom(MELLSTROY_PHRASES.happy));
        };
        if('webkitSpeechRecognition' in window){
            let recog = new webkitSpeechRecognition();
            recog.lang = 'ru-RU';
            recog.onresult = (e) => { 
                let text = e.results[0][0].transcript; 
                document.getElementById('textInput').value = text; 
                speakText(text); 
            };
            document.getElementById('micBtn').onclick = () => recog.start();
        } else document.getElementById('micBtn').onclick = () => alert("Микрофон не поддерживается");
        
        // Приветствие голосом Меллстроя
        setTimeout(() => {
            // Принудительно загружаем голоса, чтобы выбрать правильный
            window.speechSynthesis.getVoices();
            setTimeout(() => speakText("Опаньки, привет! Я Том в стиле Меллстрой! Давай играть, бро!"), 200);
        }, 500);
    })();
</script>
</body>
</html>
