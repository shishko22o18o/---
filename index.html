<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Говорящий Том — Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-start: #1a2a3a;
            --bg-end: #0e1a24;
            --card-bg: rgba(30, 40, 50, 0.75);
            --text-light: #f0e6d0;
            --accent: #ffaa44;
            --accent-dark: #cc7a00;
            --stat-bg: #2a3a44;
            --stat-fill: #4caf50;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
            transition: background-image 0.2s;
            color: var(--text-light);
        }

        /* видеофон */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        #bgVideo {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            display: none;
        }

        /* главный контейнер */
        .game-container {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 20px 25px 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,215,150,0.5);
        }

        /* верхняя панель: статистика */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 50px;
            padding: 15px 20px;
        }
        .stat {
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .stat-bar {
            height: 12px;
            background: var(--stat-bg);
            border-radius: 20px;
            overflow: hidden;
            margin: 5px 0;
        }
        .stat-fill {
            height: 100%;
            width: 100%;
            background: var(--stat-fill);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .stat-value {
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* главная зона: персонаж + действия */
        .main-area {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 30px;
        }
        .character-area {
            flex: 2;
            min-width: 280px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 20px;
            text-align: center;
        }
        #characterMedia {
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: contain;
            margin: 0 auto;
            filter: drop-shadow(10px 15px 20px rgba(0,0,0,0.5));
            cursor: pointer;
            border-radius: 40px;
            transition: transform 0.1s;
        }
        .talk-animation {
            animation: talkShake 0.22s infinite alternate;
        }
        @keyframes talkShake {
            0% { transform: scale(1) translateY(0px); }
            100% { transform: scale(1.02) translateY(-5px) rotate(1.5deg); }
        }

        .action-panel {
            flex: 1.5;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            align-content: start;
        }
        .action-btn {
            background: var(--accent);
            border: none;
            padding: 12px 8px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #2c1a0c;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 0 var(--accent-dark);
        }
        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--accent-dark);
        }

        /* речевой блок */
        .speech-block {
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        #textInput {
            flex: 3;
            padding: 14px 20px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            background: #fff2df;
        }
        .speech-btn {
            background: #3a86ff;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: inline-flex;
            gap: 8px;
            align-items: center;
        }

        /* мини-игра */
        .minigame-area {
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }
        .mouse-game {
            position: relative;
            background: #5a3e2b;
            border-radius: 30px;
            height: 120px;
            margin: 10px 0;
            cursor: pointer;
            overflow: hidden;
        }
        #mouseIcon {
            position: absolute;
            width: 50px;
            transition: all 0.05s linear;
            font-size: 3rem;
            cursor: pointer;
        }
        .upload-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .file-label {
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .file-label input {
            display: none;
        }

        @media (max-width: 800px) {
            .game-container { padding: 15px; }
            .action-panel { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="bg-video-container">
    <video id="bgVideo" autoplay loop muted playsinline></video>
</div>
<div class="game-container">
    <div class="stats-panel">
        <div class="stat"><div class="stat-label">🍎 Голод</div><div class="stat-bar"><div class="stat-fill" id="hungerFill" style="width: 80%"></div></div><div class="stat-value" id="hungerVal">80%</div></div>
        <div class="stat"><div class="stat-label">😊 Счастье</div><div class="stat-bar"><div class="stat-fill" id="happyFill" style="width: 80%"></div></div><div class="stat-value" id="happyVal">80%</div></div>
        <div class="stat"><div class="stat-label">⚡ Энергия</div><div class="stat-bar"><div class="stat-fill" id="energyFill" style="width: 80%"></div></div><div class="stat-value" id="energyVal">80%</div></div>
        <div class="stat"><div class="stat-label">🧼 Чистота</div><div class="stat-bar"><div class="stat-fill" id="cleanFill" style="width: 80%"></div></div><div class="stat-value" id="cleanVal">80%</div></div>
    </div>

    <div class="main-area">
        <div class="character-area">
            <img id="characterMedia" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='90' fill='%23F4A261'/%3E%3Ccircle cx='65' cy='80' r='12' fill='white'/%3E%3Ccircle cx='135' cy='80' r='12' fill='white'/%3E%3Ccircle cx='70' cy='82' r='5' fill='black'/%3E%3Ccircle cx='140' cy='82' r='5' fill='black'/%3E%3Cellipse cx='100' cy='115' rx='20' ry='12' fill='%23E76F51'/%3E%3Cpath d='M85 145 Q100 165 115 145' stroke='%238B5A2B' fill='none' stroke-width='4' stroke-linecap='round'/%3E%3Cpolygon points='30,45 45,20 60,45' fill='%23DDA15E'/%3E%3Cpolygon points='140,45 155,20 170,45' fill='%23DDA15E'/%3E%3Ctext x='100' y='180' text-anchor='middle' fill='%235C3A1E' font-size='16' font-weight='bold'%3E🐱 Том%3C/text%3E%3C/svg%3E" alt="Питомец" draggable="false">
        </div>
        <div class="action-panel">
            <button class="action-btn" id="feedApple">🍎 Яблоко</button>
            <button class="action-btn" id="feedFish">🐟 Рыба</button>
            <button class="action-btn" id="feedMilk">🥛 Молоко</button>
            <button class="action-btn" id="petBtn">🤚 Погладить</button>
            <button class="action-btn" id="playBall">🎾 Играть (мяч)</button>
            <button class="action-btn" id="playMouse">🐭 Играть (мышь)</button>
            <button class="action-btn" id="sleepBtn">😴 Уложить спать</button>
            <button class="action-btn" id="cleanBtn">🧽 Убрать лоток</button>
        </div>
    </div>

    <div class="speech-block">
        <input type="text" id="textInput" placeholder="Напиши что-нибудь..." value="Привет, Том!">
        <button class="speech-btn" id="speakBtn">🔊 Сказать</button>
        <button class="speech-btn" id="micBtn">🎤 Микрофон</button>
    </div>

    <div class="minigame-area">
        <div>🐁 Поймай мышь! (кликни на неё)</div>
        <div class="mouse-game" id="mouseGameArea">
            <div id="mouseIcon" style="position: absolute; left: 20px; top: 30px;">🐭</div>
        </div>
        <div id="mouseScore">Поймано мышей: 0</div>
    </div>

    <div class="upload-row">
        <label class="file-label">📁 Персонаж (PNG/WEBM) <input type="file" id="uploadCharacter" accept="image/png, image/jpeg, image/webp, video/webm"></label>
        <label class="file-label">🖼️ Фон (PNG/WEBM) <input type="file" id="uploadBg" accept="image/png, image/jpeg, image/webp, video/webm"></label>
        <button class="file-label" id="resetDefault">🌀 Сбросить всё</button>
    </div>
</div>

<script>
    (function(){
        // --- Состояние питомца ---
        let stats = {
            hunger: 80,
            happiness: 80,
            energy: 80,
            clean: 80
        };
        let mouseScore = 0;
        let gameInterval;
        let currentCharType = 'img';
        let characterMedia = document.getElementById('characterMedia');
        let talkingAnimation = false;
        let speechSynth = window.speechSynthesis;

        // DOM элементы
        const hungerFill = document.getElementById('hungerFill');
        const hungerVal = document.getElementById('hungerVal');
        const happyFill = document.getElementById('happyFill');
        const happyVal = document.getElementById('happyVal');
        const energyFill = document.getElementById('energyFill');
        const energyVal = document.getElementById('energyVal');
        const cleanFill = document.getElementById('cleanFill');
        const cleanVal = document.getElementById('cleanVal');
        const textInput = document.getElementById('textInput');
        const speakBtn = document.getElementById('speakBtn');
        const micBtn = document.getElementById('micBtn');
        const mouseIcon = document.getElementById('mouseIcon');
        const mouseGameArea = document.getElementById('mouseGameArea');
        const mouseScoreSpan = document.getElementById('mouseScore');
        
        // Обновление UI статистики
        function updateStatsUI() {
            hungerFill.style.width = stats.hunger + '%';
            hungerVal.innerText = stats.hunger + '%';
            happyFill.style.width = stats.happiness + '%';
            happyVal.innerText = stats.happiness + '%';
            energyFill.style.width = stats.energy + '%';
            energyVal.innerText = stats.energy + '%';
            cleanFill.style.width = stats.clean + '%';
            cleanVal.innerText = stats.clean + '%';
            saveGame();
        }

        // Изменение статов с ограничением
        function modifyStat(stat, delta) {
            let newVal = stats[stat] + delta;
            if (newVal > 100) newVal = 100;
            if (newVal < 0) newVal = 0;
            stats[stat] = newVal;
            updateStatsUI();
        }

        // Анимация говорения
        function startTalking() {
            if (currentCharType === 'img' && characterMedia && characterMedia.tagName === 'IMG') {
                characterMedia.classList.add('talk-animation');
                talkingAnimation = true;
            }
        }
        function stopTalking() {
            if (characterMedia && characterMedia.tagName === 'IMG') {
                characterMedia.classList.remove('talk-animation');
                talkingAnimation = false;
            }
        }

        // Звуки (используем Web Audio для простоты)
        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.type = 'sine';
                let freq = 440;
                let duration = 0.2;
                if (type === 'meow') { freq = 660; duration = 0.25; gain.gain.value = 0.3; }
                if (type === 'eat') { freq = 880; duration = 0.15; gain.gain.value = 0.2; }
                if (type === 'play') { freq = 1046; duration = 0.1; gain.gain.value = 0.25; }
                oscillator.frequency.value = freq;
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
                audioCtx.resume();
            } catch(e) { console.log("audio error"); }
        }

        // Речь
        function speakText(text) {
            if (!text || text.trim() === "") text = "Мяу!";
            if (speechSynth.speaking || speechSynth.pending) speechSynth.cancel();
            stopTalking();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.95;
            utterance.pitch = 1.2;
            utterance.onstart = startTalking;
            utterance.onend = stopTalking;
            utterance.onerror = stopTalking;
            speechSynth.speak(utterance);
            // при разговоре чуть повышаем счастье
            modifyStat('happiness', 1);
        }

        // Действия
        function feed(energyDelta) {
            modifyStat('hunger', energyDelta);
            modifyStat('happiness', 3);
            playSound('eat');
            speakText(["Ням-ням!", "Вкусно!", "Спасибо!"][Math.floor(Math.random()*3)]);
        }
        function pet() {
            modifyStat('happiness', 8);
            modifyStat('energy', 2);
            playSound('meow');
            speakText(["Мурр!", "Приятно!", "Спасибо!"][Math.floor(Math.random()*3)]);
        }
        function playGame(energyCost = 5) {
            if (stats.energy >= energyCost) {
                modifyStat('energy', -energyCost);
                modifyStat('happiness', 10);
                modifyStat('hunger', -2);
                playSound('play');
                speakText(["Весело!", "Играем!", "Ура!"][Math.floor(Math.random()*3)]);
            } else {
                speakText("Я очень устал... дай поспать.");
            }
        }
        function sleep() {
            modifyStat('energy', 25);
            modifyStat('hunger', -3);
            modifyStat('happiness', 2);
            speakText("Ззз... Мур...");
        }
        function clean() {
            modifyStat('clean', 30);
            modifyStat('happiness', 5);
            speakText("Чистота!");
        }

        // Мини-игра мышь
        let mouseInterval;
        function startMouseGame() {
            if (mouseInterval) clearInterval(mouseInterval);
            mouseInterval = setInterval(() => {
                if (!mouseGameArea) return;
                const maxX = mouseGameArea.clientWidth - 50;
                const maxY = mouseGameArea.clientHeight - 50;
                const x = Math.random() * Math.max(10, maxX);
                const y = Math.random() * Math.max(10, maxY);
                mouseIcon.style.left = x + 'px';
                mouseIcon.style.top = y + 'px';
            }, 800);
        }
        mouseIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            mouseScore++;
            mouseScoreSpan.innerText = `Поймано мышей: ${mouseScore}`;
            modifyStat('happiness', 5);
            modifyStat('energy', -2);
            playSound('play');
            speakText("Поймал!");
            // перекинуть мышь
            const x = Math.random() * (mouseGameArea.clientWidth - 50);
            const y = Math.random() * (mouseGameArea.clientHeight - 50);
            mouseIcon.style.left = x + 'px';
            mouseIcon.style.top = y + 'px';
            saveGame();
        });

        // Автоуменьшение статов каждые 15 секунд
        setInterval(() => {
            modifyStat('hunger', -3);
            modifyStat('energy', -2);
            modifyStat('clean', -4);
            if (stats.hunger < 20 || stats.energy < 20) modifyStat('happiness', -3);
            else modifyStat('happiness', 1);
        }, 15000);

        // Привязка кнопок
        document.getElementById('feedApple').onclick = () => feed(12);
        document.getElementById('feedFish').onclick = () => feed(18);
        document.getElementById('feedMilk').onclick = () => feed(10);
        document.getElementById('petBtn').onclick = () => pet();
        document.getElementById('playBall').onclick = () => playGame(6);
        document.getElementById('playMouse').onclick = () => playGame(8);
        document.getElementById('sleepBtn').onclick = () => sleep();
        document.getElementById('cleanBtn').onclick = () => clean();

        // Речь с текста
        speakBtn.onclick = () => {
            let txt = textInput.value.trim();
            if (!txt) txt = "Мяу!";
            speakText(txt);
        };
        // Микрофон
        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (e) => {
                let transcript = e.results[0][0].transcript;
                textInput.value = transcript;
                speakText(transcript);
            };
            micBtn.onclick = () => recognition.start();
        } else {
            micBtn.onclick = () => alert("Ваш браузер не поддерживает микрофон");
        }

        // Загрузка персонажа (PNG / WEBM)
        function setCharacterAsImage(dataUrl) {
            const newImg = document.createElement('img');
            newImg.id = 'characterMedia';
            newImg.src = dataUrl;
            newImg.style.width = '100%';
            newImg.style.maxWidth = '320px';
            newImg.style.height = 'auto';
            newImg.style.objectFit = 'contain';
            newImg.style.cursor = 'pointer';
            const parent = characterMedia.parentNode;
            parent.replaceChild(newImg, characterMedia);
            characterMedia = newImg;
            currentCharType = 'img';
            characterMedia.onclick = () => speakText("Мяу!");
            localStorage.setItem('customCharacter', dataUrl);
            localStorage.removeItem('customCharacterVideo');
        }
        function setCharacterAsVideo(dataUrl) {
            const newVideo = document.createElement('video');
            newVideo.id = 'characterMedia';
            newVideo.src = dataUrl;
            newVideo.autoplay = true;
            newVideo.loop = true;
            newVideo.muted = true;
            newVideo.style.width = '100%';
            newVideo.style.maxWidth = '320px';
            newVideo.style.cursor = 'pointer';
            const parent = characterMedia.parentNode;
            parent.replaceChild(newVideo, characterMedia);
            characterMedia = newVideo;
            currentCharType = 'video';
            characterMedia.onclick = () => speakText("Мяу!");
            newVideo.play();
            localStorage.setItem('customCharacterVideo', dataUrl);
            localStorage.removeItem('customCharacter');
        }
        document.getElementById('uploadCharacter').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const isVideo = file.type === 'video/webm';
            const isImage = file.type.startsWith('image/');
            if (!isVideo && !isImage) { alert("Нужен PNG/JPEG/WEBP или WEBM"); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                if (isImage) setCharacterAsImage(ev.target.result);
                else setCharacterAsVideo(ev.target.result);
            };
            reader.readAsDataURL(file);
        };
        // Фон
        const bgVideo = document.getElementById('bgVideo');
        document.getElementById('uploadBg').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const isVideo = file.type === 'video/webm';
            const isImage = file.type.startsWith('image/');
            const reader = new FileReader();
            reader.onload = (ev) => {
                if (isImage) {
                    bgVideo.style.display = 'none';
                    document.body.style.backgroundImage = `url(${ev.target.result})`;
                    document.body.style.backgroundSize = 'cover';
                    localStorage.setItem('customBackground', ev.target.result);
                    localStorage.removeItem('customBackgroundVideo');
                } else {
                    document.body.style.backgroundImage = '';
                    bgVideo.src = ev.target.result;
                    bgVideo.style.display = 'block';
                    bgVideo.play();
                    localStorage.setItem('customBackgroundVideo', ev.target.result);
                    localStorage.removeItem('customBackground');
                }
            };
            reader.readAsDataURL(file);
        };
        // Сброс
        document.getElementById('resetDefault').onclick = () => {
            localStorage.clear();
            location.reload();
        };

        // Сохранение/загрузка
        function saveGame() {
            localStorage.setItem('tomStats', JSON.stringify(stats));
            localStorage.setItem('mouseScore', mouseScore);
        }
        function loadGame() {
            const savedStats = localStorage.getItem('tomStats');
            if (savedStats) {
                stats = JSON.parse(savedStats);
                updateStatsUI();
            }
            const savedScore = localStorage.getItem('mouseScore');
            if (savedScore) mouseScore = parseInt(savedScore);
            mouseScoreSpan.innerText = `Поймано мышей: ${mouseScore}`;
            const savedCharImg = localStorage.getItem('customCharacter');
            const savedCharVideo = localStorage.getItem('customCharacterVideo');
            if (savedCharImg && savedCharImg.startsWith('data:image')) setCharacterAsImage(savedCharImg);
            else if (savedCharVideo && savedCharVideo.startsWith('data:video/webm')) setCharacterAsVideo(savedCharVideo);
            const savedBgImg = localStorage.getItem('customBackground');
            const savedBgVideo = localStorage.getItem('customBackgroundVideo');
            if (savedBgVideo && savedBgVideo.startsWith('data:video/webm')) {
                document.body.style.backgroundImage = '';
                bgVideo.src = savedBgVideo;
                bgVideo.style.display = 'block';
                bgVideo.play();
            } else if (savedBgImg && savedBgImg.startsWith('data:image')) {
                bgVideo.style.display = 'none';
                document.body.style.backgroundImage = `url(${savedBgImg})`;
            }
        }
        loadGame();
        startMouseGame();
        characterMedia.onclick = () => speakText("Мяу!");
        setTimeout(() => speakText("Привет! Я Том! Поиграем?"), 800);
    })();
</script>
</body>
</html>
