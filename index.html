<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Говорящий питомец — PNG / WEBM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* контейнер для видеофона */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        #bgVideo {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            display: none;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a5f7a 0%, #0e3a4a 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-image 0.2s;
            position: relative;
        }

        .pet-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .character-frame {
            background: rgba(255, 245, 210, 0.3);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(4px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        /* общий стиль для персонажа (и img, и video) */
        #characterMedia {
            width: 260px;
            height: 260px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(8px 12px 14px rgba(0, 0, 0, 0.3));
            cursor: pointer;
            transition: transform 0.1s ease;
            border-radius: 40px;
            background: transparent;
        }

        /* анимация говорения только для картинки */
        .talking {
            animation: talkShake 0.22s infinite alternate;
        }

        @keyframes talkShake {
            0% { transform: scale(1) translateY(0px); }
            100% { transform: scale(1.02) translateY(-4px) rotate(1deg); }
        }

        .speech-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: rgba(255, 248, 215, 0.85);
            border-radius: 80px;
            padding: 12px 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        #textInput {
            flex: 2;
            min-width: 180px;
            padding: 14px 20px;
            border-radius: 60px;
            border: none;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            text-align: center;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            border: 2px solid #ffb05a;
            outline: none;
        }

        .speak-btn {
            background: #ff9f4a;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 0 #b45f1a;
            transition: 0.05s linear;
            font-family: inherit;
        }

        .speak-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b45f1a;
        }

        .file-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .file-label {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,200,0.6);
        }

        .file-label:active {
            transform: scale(0.96);
            background: rgba(0, 0, 0, 0.6);
        }

        .file-label input {
            display: none;
        }

        @media (max-width: 550px) {
            #characterMedia { width: 200px; height: 200px; }
            .speak-btn { font-size: 1rem; padding: 0 18px; }
            .file-label { padding: 5px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="bg-video-container">
    <video id="bgVideo" autoplay loop muted playsinline></video>
</div>

<div class="pet-container">
    <div class="character-frame">
        <!-- единый элемент для персонажа: изначально img -->
        <img id="characterMedia" 
             src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='90' fill='%23F4A261'/%3E%3Ccircle cx='65' cy='80' r='12' fill='white'/%3E%3Ccircle cx='135' cy='80' r='12' fill='white'/%3E%3Ccircle cx='70' cy='82' r='5' fill='black'/%3E%3Ccircle cx='140' cy='82' r='5' fill='black'/%3E%3Cellipse cx='100' cy='115' rx='20' ry='12' fill='%23E76F51'/%3E%3Cpath d='M85 145 Q100 165 115 145' stroke='%238B5A2B' fill='none' stroke-width='4' stroke-linecap='round'/%3E%3Cpolygon points='30,45 45,20 60,45' fill='%23DDA15E'/%3E%3Cpolygon points='140,45 155,20 170,45' fill='%23DDA15E'/%3E%3Ctext x='100' y='180' text-anchor='middle' fill='%235C3A1E' font-size='16' font-weight='bold'%3E🐱 Том%3C/text%3E%3C/svg%3E"
             alt="Питомец" draggable="false">
    </div>

    <div class="speech-bar">
        <input type="text" id="textInput" placeholder="Напиши фразу..." value="Привет! Я твой друг!">
        <button class="speak-btn" id="speakBtn">🔊 Сказать</button>
    </div>

    <div class="file-buttons">
        <label class="file-label">
            📁 Загрузить персонажа (PNG / WEBM)
            <input type="file" id="uploadCharacter" accept="image/png, image/jpeg, image/webp, video/webm">
        </label>
        <label class="file-label">
            🖼️ Загрузить фон (PNG / WEBM)
            <input type="file" id="uploadBg" accept="image/png, image/jpeg, image/webp, video/webm">
        </label>
    </div>
</div>

<script>
    (function(){
        // Получаем элементы
        let characterMedia = document.getElementById('characterMedia');
        const speakBtn = document.getElementById('speakBtn');
        const textInput = document.getElementById('textInput');
        const uploadChar = document.getElementById('uploadCharacter');
        const uploadBg = document.getElementById('uploadBg');
        const bgVideo = document.getElementById('bgVideo');
        
        // Тип текущего персонажа ('img' или 'video')
        let currentCharType = 'img';
        
        // Функция обновления глобальной ссылки (чтобы обработчики всегда работали)
        function updateCharacterRef() {
            characterMedia = document.getElementById('characterMedia');
            if (!characterMedia) return;
            // Навешиваем обработчик клика (если его нет)
            characterMedia.onclick = (e) => {
                e.stopPropagation();
                const meows = ["Мяу!", "Мур-мяу!", "Приветик!", "Мяяу!", "Здарова!"];
                const rand = meows[Math.floor(Math.random() * meows.length)];
                speakText(rand);
                characterMedia.style.transform = "scale(1.05)";
                setTimeout(() => { if(characterMedia) characterMedia.style.transform = ""; }, 150);
            };
        }
        
        // Анимация говорения (только для картинки)
        function startTalking() {
            if (currentCharType === 'img' && characterMedia && characterMedia.tagName === 'IMG') {
                characterMedia.classList.add('talking');
            }
        }
        function stopTalking() {
            if (characterMedia && characterMedia.tagName === 'IMG') {
                characterMedia.classList.remove('talking');
            }
        }
        
        // Синтез речи
        function speakText(text) {
            if (!text || text.trim() === "") {
                text = "Мяу? Напиши что-нибудь!";
                textInput.value = text;
            }
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            stopTalking();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.95;
            utterance.pitch = 1.2;
            utterance.onstart = startTalking;
            utterance.onend = stopTalking;
            utterance.onerror = stopTalking;
            window.speechSynthesis.speak(utterance);
        }
        
        // Кнопка "Сказать"
        speakBtn.addEventListener('click', () => {
            let userText = textInput.value.trim();
            if (userText === "") {
                userText = "Мяу! Скажи что-нибудь!";
                textInput.value = userText;
            }
            speakText(userText);
            if (characterMedia) {
                characterMedia.style.transform = "scale(0.98)";
                setTimeout(() => { if(characterMedia) characterMedia.style.transform = ""; }, 120);
            }
        });
        
        // Замена персонажа (универсальная)
        function setCharacterAsImage(dataUrl) {
            const newImg = document.createElement('img');
            newImg.id = 'characterMedia';
            newImg.src = dataUrl;
            newImg.alt = "Питомец";
            newImg.draggable = false;
            // копируем стили
            newImg.style.width = '260px';
            newImg.style.height = '260px';
            newImg.style.objectFit = 'contain';
            newImg.style.display = 'block';
            newImg.style.margin = '0 auto';
            newImg.style.filter = 'drop-shadow(8px 12px 14px rgba(0, 0, 0, 0.3))';
            newImg.style.cursor = 'pointer';
            newImg.style.borderRadius = '40px';
            newImg.style.transition = 'transform 0.1s ease';
            const parent = characterMedia.parentNode;
            parent.replaceChild(newImg, characterMedia);
            characterMedia = newImg;
            currentCharType = 'img';
            updateCharacterRef();
            // сохраняем в localStorage
            localStorage.setItem('customCharacter', dataUrl);
            localStorage.removeItem('customCharacterVideo');
        }
        
        function setCharacterAsVideo(dataUrl) {
            const newVideo = document.createElement('video');
            newVideo.id = 'characterMedia';
            newVideo.src = dataUrl;
            newVideo.autoplay = true;
            newVideo.loop = true;
            newVideo.muted = true;    // обязательный muted для автоплея
            newVideo.playsInline = true;
            newVideo.style.width = '260px';
            newVideo.style.height = '260px';
            newVideo.style.objectFit = 'contain';
            newVideo.style.display = 'block';
            newVideo.style.margin = '0 auto';
            newVideo.style.filter = 'drop-shadow(8px 12px 14px rgba(0, 0, 0, 0.3))';
            newVideo.style.cursor = 'pointer';
            newVideo.style.borderRadius = '40px';
            newVideo.style.transition = 'transform 0.1s ease';
            const parent = characterMedia.parentNode;
            parent.replaceChild(newVideo, characterMedia);
            characterMedia = newVideo;
            currentCharType = 'video';
            updateCharacterRef();
            // запускаем воспроизведение
            newVideo.play().catch(e => console.warn("Автоплей видео персонажа:", e));
            // видео не храним в localStorage (большой объём), храним флаг
            localStorage.removeItem('customCharacter');
            localStorage.setItem('customCharacterVideo', dataUrl); // сохраняем ссылку как dataUrl (осторожно, может быть большим, но для небольших видео норм)
        }
        
        // Загрузка персонажа
        uploadChar.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fileType = file.type;
            const isVideo = fileType === 'video/webm';
            const isImage = fileType.startsWith('image/');
            if (!isVideo && !isImage) {
                alert("Поддерживаются PNG, JPEG, WEBP и WEBM для персонажа");
                uploadChar.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                const dataUrl = ev.target.result;
                if (isImage) {
                    setCharacterAsImage(dataUrl);
                } else {
                    setCharacterAsVideo(dataUrl);
                }
            };
            reader.readAsDataURL(file);
            uploadChar.value = '';
        });
        
        // Загрузка фона
        uploadBg.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fileType = file.type;
            const isVideo = fileType === 'video/webm';
            const isImage = fileType.startsWith('image/');
            if (!isVideo && !isImage) {
                alert("Поддерживаются PNG, JPEG, WEBP и WEBM для фона");
                uploadBg.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                const dataUrl = ev.target.result;
                if (isImage) {
                    // статичный фон через body background
                    bgVideo.style.display = 'none';
                    bgVideo.pause();
                    bgVideo.src = '';
                    document.body.style.backgroundImage = `url(${dataUrl})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                    localStorage.setItem('customBackground', dataUrl);
                    localStorage.removeItem('customBackgroundVideo');
                } else {
                    // видеофон
                    document.body.style.backgroundImage = '';
                    bgVideo.src = dataUrl;
                    bgVideo.style.display = 'block';
                    bgVideo.play().catch(e => console.warn("Автоплей видеофона:", e));
                    localStorage.setItem('customBackgroundVideo', dataUrl);
                    localStorage.removeItem('customBackground');
                }
            };
            reader.readAsDataURL(file);
            uploadBg.value = '';
        });
        
        // Восстановление сохранённых данных
        const savedCharImg = localStorage.getItem('customCharacter');
        const savedCharVideo = localStorage.getItem('customCharacterVideo');
        if (savedCharImg && savedCharImg.startsWith('data:image')) {
            setCharacterAsImage(savedCharImg);
        } else if (savedCharVideo && savedCharVideo.startsWith('data:video/webm')) {
            setCharacterAsVideo(savedCharVideo);
        }
        
        const savedBgImg = localStorage.getItem('customBackground');
        const savedBgVideo = localStorage.getItem('customBackgroundVideo');
        if (savedBgVideo && savedBgVideo.startsWith('data:video/webm')) {
            document.body.style.backgroundImage = '';
            bgVideo.src = savedBgVideo;
            bgVideo.style.display = 'block';
            bgVideo.play().catch(e => console.log);
        } else if (savedBgImg && savedBgImg.startsWith('data:image')) {
            bgVideo.style.display = 'none';
            document.body.style.backgroundImage = `url(${savedBgImg})`;
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundAttachment = 'fixed';
        }
        
        // Инициализация обработчика клика для текущего элемента
        updateCharacterRef();
        
        // Приветствие
        setTimeout(() => {
            speakText("Привет! Я твой говорящий друг. Напиши что-нибудь и нажми «Сказать»!");
        }, 400);
        
        // Сброс анимации, если речь зависла
        setInterval(() => {
            if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                stopTalking();
            }
        }, 300);
    })();
</script>
</body>
</html>
