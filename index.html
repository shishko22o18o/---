<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Говорящий питомец</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a5f7a 0%, #0e3a4a 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-image 0.2s;
        }

        /* главный блок — только персонаж и кнопка */
        .pet-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        /* зона персонажа */
        .character-wrapper {
            background: rgba(255, 245, 210, 0.4);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(4px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        #characterImg {
            width: 260px;
            height: 260px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(8px 12px 14px rgba(0, 0, 0, 0.3));
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        /* анимация говорения */
        .talking {
            animation: talkShake 0.22s infinite alternate;
        }

        @keyframes talkShake {
            0% { transform: scale(1) translateY(0px); }
            100% { transform: scale(1.02) translateY(-4px) rotate(1deg); }
        }

        /* панель "Сказать" — только поле + кнопка */
        .speech-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: rgba(255, 248, 215, 0.85);
            border-radius: 80px;
            padding: 12px 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        #textInput {
            flex: 2;
            min-width: 180px;
            padding: 14px 20px;
            border-radius: 60px;
            border: none;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            text-align: center;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            border: 2px solid #ffb05a;
            outline: none;
        }

        .speak-btn {
            background: #ff9f4a;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 0 #b45f1a;
            transition: 0.05s linear;
            font-family: inherit;
        }

        .speak-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b45f1a;
        }

        /* подсказка для перетаскивания — почти незаметна, но нужна для юзабилити */
        .drag-hint {
            font-size: 0.65rem;
            margin-top: 14px;
            color: rgba(255,245,200,0.7);
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 550px) {
            #characterImg { width: 200px; height: 200px; }
            .speak-btn { font-size: 1rem; padding: 0 18px; }
            .speech-bar { padding: 10px 15px; }
        }
    </style>
</head>
<body>

<div class="pet-container">
    <div class="character-wrapper">
        <img id="characterImg" 
             src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='90' fill='%23F4A261'/%3E%3Ccircle cx='65' cy='80' r='12' fill='white'/%3E%3Ccircle cx='135' cy='80' r='12' fill='white'/%3E%3Ccircle cx='70' cy='82' r='5' fill='black'/%3E%3Ccircle cx='140' cy='82' r='5' fill='black'/%3E%3Cellipse cx='100' cy='115' rx='20' ry='12' fill='%23E76F51'/%3E%3Cpath d='M85 145 Q100 165 115 145' stroke='%238B5A2B' fill='none' stroke-width='4' stroke-linecap='round'/%3E%3Cpolygon points='30,45 45,20 60,45' fill='%23DDA15E'/%3E%3Cpolygon points='140,45 155,20 170,45' fill='%23DDA15E'/%3E%3Ctext x='100' y='180' text-anchor='middle' fill='%235C3A1E' font-size='16' font-weight='bold'%3E🐱 Том%3C/text%3E%3C/svg%3E"
             alt="Питомец" draggable="false">
    </div>

    <div class="speech-bar">
        <input type="text" id="textInput" placeholder="Напиши фразу..." value="Привет! Я твой друг!">
        <button class="speak-btn" id="speakBtn">🔊 Сказать</button>
    </div>
    <div class="drag-hint">
        📂 Перетащи PNG на питомца → новый образ | Перетащи картинку на фон → новый фон
    </div>
</div>

<script>
    (function(){
        // --- ЭЛЕМЕНТЫ ---
        const characterImg = document.getElementById('characterImg');
        const speakBtn = document.getElementById('speakBtn');
        const textInput = document.getElementById('textInput');
        
        // --- АНИМАЦИЯ ГОВОРЕНИЯ ---
        function startTalking() { characterImg.classList.add('talking'); }
        function stopTalking() { characterImg.classList.remove('talking'); }
        
        // --- СИНТЕЗ РЕЧИ ---
        function speakText(text) {
            if (!text || text.trim() === "") {
                text = "Мяу? Напиши что-нибудь!";
                textInput.value = text;
            }
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            stopTalking();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.95;
            utterance.pitch = 1.2;
            utterance.onstart = startTalking;
            utterance.onend = stopTalking;
            utterance.onerror = stopTalking;
            window.speechSynthesis.speak(utterance);
        }
        
        // --- КНОПКА "СКАЗАТЬ" ---
        speakBtn.addEventListener('click', () => {
            let userText = textInput.value.trim();
            if (userText === "") {
                userText = "Мяу! Скажи что-нибудь!";
                textInput.value = userText;
            }
            speakText(userText);
            // легкий отклик
            characterImg.style.transform = "scale(0.98)";
            setTimeout(() => { characterImg.style.transform = ""; }, 120);
        });
        
        // --- КЛИК НА ПЕРСОНАЖЕ (мяу) ---
        characterImg.addEventListener('click', (e) => {
            e.stopPropagation();
            const meows = ["Мяу!", "Мур-мяу!", "Приветик!", "Мяяу!", "Здарова!"];
            const rand = meows[Math.floor(Math.random() * meows.length)];
            speakText(rand);
            characterImg.style.transform = "scale(1.05)";
            setTimeout(() => { characterImg.style.transform = ""; }, 150);
        });
        
        // --- ЗАГРУЗКА ПЕРСОНАЖА ЧЕРЕЗ ПЕРЕТАСКИВАНИЕ (Drag & Drop) ---
        characterImg.addEventListener('dragover', (e) => {
            e.preventDefault();
            characterImg.style.opacity = "0.8";
        });
        characterImg.addEventListener('dragleave', () => {
            characterImg.style.opacity = "1";
        });
        characterImg.addEventListener('drop', (e) => {
            e.preventDefault();
            characterImg.style.opacity = "1";
            const file = e.dataTransfer.files[0];
            if (file && (file.type === 'image/png' || file.type === 'image/jpeg' || file.type === 'image/webp')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    characterImg.src = ev.target.result;
                    localStorage.setItem('customCharacter', ev.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                alert("Перетащите PNG, JPEG или WEBP изображение для персонажа");
            }
        });
        
        // --- ЗАГРУЗКА ФОНА ЧЕРЕЗ ПЕРЕТАСКИВАНИЕ НА BODY ---
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.style.opacity = "0.95";
        });
        document.body.addEventListener('dragleave', () => {
            document.body.style.opacity = "1";
        });
        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.style.opacity = "1";
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.body.style.backgroundImage = `url(${ev.target.result})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                    localStorage.setItem('customBackground', ev.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                alert("Перетащите изображение для фона (PNG, JPG, WEBP)");
            }
        });
        
        // --- ВОССТАНОВЛЕНИЕ СОХРАНЁННЫХ ДАННЫХ ---
        const savedChar = localStorage.getItem('customCharacter');
        if (savedChar && savedChar.startsWith('data:image')) {
            characterImg.src = savedChar;
        }
        const savedBg = localStorage.getItem('customBackground');
        if (savedBg && savedBg.startsWith('data:image')) {
            document.body.style.backgroundImage = `url(${savedBg})`;
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundAttachment = 'fixed';
        }
        
        // --- ПРИВЕТСТВИЕ ПРИ ЗАГРУЗКЕ (один раз) ---
        setTimeout(() => {
            speakText("Привет! Я твой говорящий друг. Напиши что-нибудь и нажми «Сказать»!");
        }, 400);
        
        // --- СБРОС АНИМАЦИИ, ЕСЛИ РЕЧЬ ЗАВИСЛА ---
        setInterval(() => {
            if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                stopTalking();
            }
        }, 300);
    })();
</script>
</body>
</html>
